<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="980" height="320" fill="#ffffff"/>
  <text x="490" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Skill treatment — Pipeline generate-first</text>

  <!-- 1 Input -->
  <rect x="20" y="120" width="150" height="80" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="95" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">1 · ĐẦU VÀO</text>
  <text x="95" y="172" text-anchor="middle" font-size="11" fill="#0c4a6e">Kịch bản / brief</text>
  <text x="95" y="188" text-anchor="middle" font-size="11" fill="#0c4a6e">đã chốt</text>

  <!-- 2 Design -->
  <rect x="200" y="100" width="170" height="120" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="285" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">2 · 3 ĐIỂM CHẠM</text>
  <text x="285" y="152" text-anchor="middle" font-size="11" fill="#4c1d95">Thị giác (Visual)</text>
  <text x="285" y="170" text-anchor="middle" font-size="11" fill="#4c1d95">Thính giác (Aural)</text>
  <text x="285" y="188" text-anchor="middle" font-size="11" fill="#4c1d95">Trái tim (Heart)</text>
  <text x="285" y="208" text-anchor="middle" font-size="10" fill="#7c3aed">+ bẻ shot / storyboard</text>

  <!-- 3 Engine -->
  <rect x="400" y="70" width="200" height="180" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="500" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">3 · ĐỘNG CƠ TỰ ĐỘNG</text>
  <rect x="416" y="110" width="168" height="36" rx="6" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="500" y="132" text-anchor="middle" font-size="10.5" fill="#92400e">🖼️ ChatGPT Image 2 → ảnh</text>
  <rect x="416" y="152" width="168" height="36" rx="6" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="500" y="174" text-anchor="middle" font-size="10.5" fill="#92400e">🎥 WebSearch → reference</text>
  <rect x="416" y="194" width="168" height="36" rx="6" fill="#fffbeb" stroke="#f59e0b"/>
  <text x="500" y="216" text-anchor="middle" font-size="10.5" fill="#92400e">🎵 Suno → nhạc mood&amp;tone</text>

  <!-- 4 Assemble -->
  <rect x="630" y="100" width="170" height="120" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="715" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">4 · ĐÓNG GÓI</text>
  <text x="715" y="156" text-anchor="middle" font-size="11" fill="#166534">📐 File Canva (MCP)</text>
  <text x="715" y="178" text-anchor="middle" font-size="11" fill="#166534">📊 File PPTX (pptxgenjs)</text>
  <text x="715" y="202" text-anchor="middle" font-size="10" fill="#16a34a">nhúng asset thật</text>

  <!-- 5 QC -->
  <rect x="830" y="120" width="130" height="80" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="895" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">5 · QC</text>
  <text x="895" y="172" text-anchor="middle" font-size="11" fill="#991b1b">Người dùng</text>
  <text x="895" y="188" text-anchor="middle" font-size="11" fill="#991b1b">QC &amp; update</text>

  <!-- arrows -->
  <line x1="170" y1="160" x2="198" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="160" x2="398" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="160" x2="628" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="160" x2="828" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="490" y="290" text-anchor="middle" font-size="11" fill="#64748b">Thiếu công cụ ở bước 3–4 → tự fallback về placeholder + prompt ẩn, có Bảng truy vết asset. Không bao giờ bịa.</text>
</svg>
